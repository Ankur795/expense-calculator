<!DOCTYPE html>
<html lang="en">
<head>
  <title>Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- heading section -->
  <section>
    <div class="container px-5 py-8 mx-auto">
      <div class="flex justify-center items-center gap-3">
        <p class="font-sans text-4xl sm:text-5xl font-bold text-gray-700 tracking-tight text-center">
          Expense Tracker
        </p>
      </div>
      <p class="text-center text-gray-400 text-lg mt-2">Track your daily spending</p>
    </div>
  </section>

  <!-- input section -->
  <section>
    <div class="container px-5 mx-auto">
      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
        <p class="text-gray-500 text-base font-medium mb-4 uppercase tracking-wide">Add New Expense</p>

        <div class="flex flex-col gap-4">
          <input id="input-expense"
            class="w-full text-lg border border-gray-300 text-gray-700 px-4 py-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-400 bg-gray-50"
            type="text" placeholder="Expense name">

          <input id="input-amount"
            class="w-full text-lg border border-gray-300 text-gray-700 px-4 py-4 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-400 bg-gray-50"
            type="number" placeholder="Enter amount (₹)">

          <button id="add-btn"
            class="w-full text-xl font-semibold rounded-xl text-white bg-gray-900 px-6 py-4 hover:bg-cyan-600 active:scale-95 transition-all duration-200">
            + Add Expense
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- expense list section -->
  <section>
    <div class="container px-5 py-6 mx-auto">

      <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
        <div class="flex justify-between items-center px-5 py-4 border-b border-gray-100">
          <p class="text-gray-500 text-base font-medium uppercase tracking-wide">Expenses</p>
          <span id="expense-count" class="text-sm text-gray-400">0 items</span>
        </div>

        <ol style="list-style: upper-roman;"
          id="order-list"
          class="divide-y divide-gray-100 px-2 py-2 space-y-0">
        </ol>

        <div id="empty-state" class="flex flex-col items-center justify-center py-12 text-gray-300">
          <p class="text-5xl mb-3">🧾</p>
          <p class="text-base">No expenses added yet</p>
        </div>
      </div>

      <!-- total -->
      <div class="mt-4 bg-cyan-50 border border-cyan-200 rounded-2xl px-5 py-4 flex justify-between items-center">
        <span class="text-lg font-medium text-cyan-700">Total Spent</span>
        <h2 id="total" class="text-2xl font-bold text-cyan-700">₹0.00</h2>
      </div>

    </div>
  </section>

</body>
<script src="script.js"></script>
</html>
